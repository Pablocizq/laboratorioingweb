name: CI de Compilación y Dependencias

on:
  push:
    branches: [ "main", "master" ]
  pull_request:
    branches: [ "main", "master" ]

jobs:
  build-and-test:
    runs-on: ubuntu-latest

    strategy:
      matrix:
        node-version: [24.x]

    steps:
    - name: Descargamos el código del repositorio
      uses: actions/checkout@v4

    - name: Configuramos Node.js ${{ matrix.node-version }}
      uses: actions/setup-node@v4
      with:
        node-version: ${{ matrix.node-version }}

    - name: Gestionamos dependencias y construimos app-Server
      working-directory: laboratorioingweb/backend/app-server
      run: |
        npm install

    - name: Gestionamos dependencias y construimos gateway
      working-directory: laboratorioingweb/backend/gateway
      run: |
        npm install
